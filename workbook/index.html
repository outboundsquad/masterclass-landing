<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outbound Masterclass Workbook | Outbound Squad</title>
  <meta name="description" content="Your companion workbook for the free Outbound Masterclass course. Complete exercises, save progress, and export your completed plan as a PDF.">
  <meta name="robots" content="noindex, nofollow">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <!-- Top Bar -->
    <header class="topbar">
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>

      <img src="logo.png" alt="Outbound Squad" class="topbar-logo">

      <div class="topbar-title">
        <span class="topbar-title-main">Outbound Masterclass Workbook</span>
        <span class="topbar-title-context" id="topbarContext"></span>
      </div>

      <div class="topbar-progress">
        <span class="progress-label" id="progressLabel">0 of 15 modules complete</span>
        <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
        <span class="save-indicator" id="saveIndicator">
          <span class="save-indicator-dot"></span><span>Saved</span>
        </span>
      </div>

      <div class="topbar-actions">
        <button class="topbar-btn" id="exportBtn" title="Export as PDF">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          <span>Export</span>
        </button>
        <button class="topbar-btn topbar-btn-primary" id="saveCloudBtn" title="Save to cloud">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" />
          </svg>
          <span>Save to Cloud</span>
        </button>
      </div>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <main class="main" id="main"></main>
  </div>

  <!-- Content + App Logic -->
  <script src="content.js"></script>
  <script src="app.js"></script>
</body>
</html>
